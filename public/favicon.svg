<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#ffa300" stroke-width="1.5" opacity="0.6"/>
  <!-- G - pixel art style -->
  <rect x="9" y="5" width="14" height="3" fill="#ffa300"/>
  <rect x="6" y="5" width="3" height="22" fill="#ffa300"/>
  <rect x="9" y="24" width="14" height="3" fill="#ffa300"/>
  <rect x="20" y="14" width="3" height="13" fill="#ffa300"/>
  <rect x="14" y="14" width="9" height="3" fill="#ffa300"/>
  <!-- Git branch node -->
  <circle cx="25" cy="8" r="2.5" fill="#00e436"/>
  <line x1="25" y1="10.5" x2="25" y2="14" stroke="#00e436" stroke-width="1.5"/>
  <!-- Second branch node -->
  <circle cx="25" cy="8" r="2.5" fill="#00e436" opacity="0.4">
    <animate attributeName="r" values="2.5;3.5;2.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
